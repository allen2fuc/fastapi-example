services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_example
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/data

  redis:
    image: redis:8
    restart: unless-stopped
    ports:
      - "6375:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
